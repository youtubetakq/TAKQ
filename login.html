<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>T 내전 시스템</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
  width: 100%;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
}

.page {
  width: 100%;
  min-height: 100vh;
  background-image: url('https://i.ibb.co/PsfQ9SDH/image.png');
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.login-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 1600px;
  gap: clamp(60px, 12vw, 220px);
  flex-wrap: wrap;
}

.login-box {
  position: relative;
  width: clamp(320px, 46vw, 680px);
  flex-shrink: 0;
}

.login-box-img {
  width: 100%;
  display: block;
}

/* 입력칸 - % 기반으로 이미지 위에 정확히 올림 */
.input-manager-id {
  position: absolute;
  left: 9%;
  right: 9%;
  top: 50%;
  height: 10%;
  background: rgba(255,255,255,0.92);
  border: none;
  border-radius: 30px;
  font-size: clamp(11px, 1.3vw, 15px);
  color: #555;
  padding: 0 clamp(14px, 2vw, 22px);
  outline: none;
  font-family: inherit;
  cursor: text;
}
.input-manager-id:focus { background: rgba(255,255,255,0.92); color: #333; }
.input-manager-id::placeholder { color: #999; }

.input-password {
  position: absolute;
  left: 9%;
  right: 9%;
  top: 64%;
  height: 10%;
  background: rgba(255,255,255,0.92);
  border: none;
  border-radius: 30px;
  font-size: clamp(11px, 1.3vw, 15px);
  color: #555;
  padding: 0 clamp(14px, 2vw, 22px);
  outline: none;
  font-family: inherit;
  cursor: text;
}
.input-password:focus { background: rgba(255,255,255,0.92); color: #333; }
.input-password::placeholder { color: #999; }

/* 로그인 버튼 - 오른쪽 */
.login-btn {
  position: absolute;
  right: 9%;
  bottom: 11%;
  width: 38%;
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
  transition: opacity 0.2s, transform 0.1s;
}
.login-btn img { width: 100%; display: block; }
.login-btn:hover { opacity: 0.85; }
.login-btn:active { transform: scale(0.96); }

/* 톱니바퀴 - 로그인 버튼 오른쪽 아래, 작게 */
.gear-btn {
  position: absolute;
  right: 9%;
  bottom: 3%;
  width: 6%;
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
  transition: opacity 0.2s, transform 0.35s;
  display: flex;
  align-items: center;
}
.gear-btn img { width: 100%; display: block; }
.gear-btn:hover { opacity: 0.8; transform: rotate(35deg); }

/* 로고 */
.character-wrap {
  width: clamp(200px, 32vw, 420px);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.character-wrap img {
  width: 100%;
  max-width: 400px;
  display: block;
  object-fit: contain;
}

/* 에러 메시지 */
.error-msg {
  position: fixed;
  bottom: 9%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(210, 50, 50, 0.93);
  color: white;
  padding: 10px 30px;
  border-radius: 30px;
  font-size: clamp(13px, 1.4vw, 15px);
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  font-family: inherit;
  z-index: 100;
}
.error-msg.show { opacity: 1; }

/* 모달 */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: white;
  border-radius: 16px;
  padding: 28px 32px;
  min-width: 280px;
  max-width: 360px;
  width: 90%;
}
.modal h3 {
  font-size: 17px;
  font-weight: 600;
  color: #4a3fc0;
  margin-bottom: 18px;
  text-align: center;
}
.modal table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.modal table th {
  background: #f0eeff;
  color: #5a4fcf;
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
}
.modal table td {
  padding: 9px 12px;
  border-bottom: 1px solid #f0f0f0;
  color: #444;
}
.modal table tr:last-child td { border-bottom: none; }

.role-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}
.role-badge.admin { background: #ffe5e5; color: #c0392b; }
.role-badge.manager { background: #e5eeff; color: #2856c0; }

.modal-close {
  display: block;
  margin: 18px auto 0;
  padding: 8px 32px;
  background: #5a4fcf;
  color: white;
  border: none;
  border-radius: 30px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}
.modal-close:hover { background: #4a3fb0; }

@media (max-width: 650px) {
  .login-wrapper { flex-direction: column; align-items: center; gap: 0; }
  .character-wrap { order: -1; width: clamp(140px, 55vw, 240px); }
  .login-box { width: clamp(260px, 85vw, 370px); }
}
</style>
</head>
<body>

<div class="page">
  <div class="login-wrapper">

    <div class="login-box">
      <img class="login-box-img" src="https://i.ibb.co/TxJ0nygL/image.png" alt="login box" />
      <input class="input-manager-id" type="text" id="idInput" placeholder="Manager ID" autocomplete="off" />
      <input class="input-password" type="password" id="pwInput" placeholder="Password" autocomplete="off" />
      <button class="login-btn" onclick="handleLogin()">
        <img src="https://i.ibb.co/FZmWD2L/Login.png" alt="Login" />
      </button>
      <button class="gear-btn" onclick="openModal()">
        <img src="https://i.ibb.co/5hzkJkW6/image.png" alt="설정" />
      </button>
    </div>

    <div class="character-wrap">
      <img src="https://i.ibb.co/wh7hRJnQ/1.png" alt="logo" />
    </div>

  </div>

  <div class="error-msg" id="errorMsg">정확한 정보를 입력해주세요.</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>계정 목록</h3>
    <table>
      <thead>
        <tr><th>역할</th><th>아이디</th><th>비밀번호</th></tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="role-badge admin">관리자</span></td>
          <td>LOLTCK01</td>
          <td style="letter-spacing:3px;color:#bbb;">••••••••••</td>
        </tr>
        <tr>
          <td><span class="role-badge manager">매니저 1</span></td>
          <td>LOLTCK02</td>
          <td style="letter-spacing:3px;color:#bbb;">••••••••••</td>
        </tr>
        <tr>
          <td><span class="role-badge manager">매니저 2</span></td>
          <td>LOLTCK03</td>
          <td style="letter-spacing:3px;color:#bbb;">••••••••••</td>
        </tr>
        <tr>
          <td><span class="role-badge manager">매니저 3</span></td>
          <td>LOLTCK04</td>
          <td style="letter-spacing:3px;color:#bbb;">••••••••••</td>
        </tr>
        <tr>
          <td><span class="role-badge manager">매니저 4</span></td>
          <td>LOLTCK05</td>
          <td style="letter-spacing:3px;color:#bbb;">••••••••••</td>
        </tr>
      </tbody>
    </table>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

<script>
const accounts = [
  { id: 'LOLTCK01', pw: 'LOLTCK01' },
  { id: 'LOLTCK02', pw: 'LOLTCK02' },
  { id: 'LOLTCK03', pw: 'LOLTCK03' },
  { id: 'LOLTCK04', pw: 'LOLTCK04' },
  { id: 'LOLTCK05', pw: 'LOLTCK05' }
];

let errTimer = null;

function handleLogin() {
  const id = document.getElementById('idInput').value.trim();
  const pw = document.getElementById('pwInput').value.trim();
  const valid = accounts.some(a => a.id === id && a.pw === pw);
  if (valid) {
    sessionStorage.setItem('loggedId', id);
    localStorage.setItem('loggedId', id);
    window.location.href = 'main_26.html';
  } else {
    showError();
  }
}

function showError() {
  const el = document.getElementById('errorMsg');
  el.classList.add('show');
  if (errTimer) clearTimeout(errTimer);
  errTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('idInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('pwInput').focus();
});
document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
</script>

</body>
</html>
